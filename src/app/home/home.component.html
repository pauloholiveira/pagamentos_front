<div class="container">
  <h1>Olá mundo</h1>

  <section class="lista-section">
    <div *ngIf="carregando" class="estado">Carregando...</div>

    <div *ngIf="erro" class="estado erro">{{ erro }}</div>

    <ul *ngIf="!carregando && !erro">
      <li *ngFor="let item of lista">
        {{ item | json }}
      </li>
    </ul>
  </section>
</div>
