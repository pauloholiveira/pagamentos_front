<div class="container">
  <h1>Olá mundo</h1>

  <section class="lista-section">
    @if (carregando()) {
      <div class="estado">Carregando...</div>
    }

    @if (erro()) {
      <div class="estado erro">{{ erro() }}</div>
    }

    @if (!carregando() && !erro()) {
      <ul>
        @for (item of lista(); track $index) {
          <li>
            {{ item | json }}
          </li>
        }
      </ul>
    }
  </section>
</div>
